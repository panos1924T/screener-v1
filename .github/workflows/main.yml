name: Daily Swing Screener

on:
  schedule:
    # Εκτέλεση στις 20:30 UTC (23:30 Ώρα Ελλάδος) από Δευτέρα έως Παρασκευή
    - cron: '30 20 * * 1-5'
  workflow_dispatch: # Επιτρέπει τη χειροκίνητη εκτέλεση για δοκιμή

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Screener Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python screener.py
